<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Health Monitor</title>
    <!-- We load Tailwind CSS directly for styling without a build step -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles for the little triangle on the tooltip */
        .tooltip-triangle {
            width: 0; height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 8px solid #1e293b;
            position: absolute;
            top: -8px;
            left: 20px;
        }
        /* Smooth transition for the score ring */
        .score-circle {
            transition: stroke-dasharray 0.5s ease-out, stroke 0.5s ease-out;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans pb-24 select-none">
    
    <!-- This is where our app will render -->
    <div id="app" class="relative"></div>

    <script>
        // 1. Define our Icons (SVG format)
        const ICONS = {
            info: (cls) => `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${cls}"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>`,
            award: (cls) => `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${cls}"><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg>`,
            flame: (cls) => `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${cls}"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"></path></svg>`,
            shield: (cls) => `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${cls}"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>`,
            activity: (cls) => `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${cls}"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>`,
            check: (cls) => `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${cls}"><polyline points="20 6 9 17 4 12"></polyline></svg>`,
            x: (cls) => `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${cls}"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`,
            calendar: (cls) => `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${cls}"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>`
        };

        // 2. Define our Data
        const QUESTIONS = [
            { id: 'q1', type: 'positive', label: '30 Mins Intentional Exercise', pts: 25, tip: 'Cardio or strength training where your heart rate is elevated. E.g., brisk walking, running, swimming, or cycling.' },
            { id: 'q2', type: 'positive', label: '2+ Servings of Vegetables', pts: 25, tip: 'One serving is about 1 cup of raw leafy greens or 1/2 cup of cooked vegetables.' },
            { id: 'q3', type: 'positive', label: '7+ Hours of Restful Sleep', pts: 25, tip: 'Uninterrupted sleep. If you woke up tired, it might not count as restful!' },
            { id: 'q4', type: 'positive', label: 'Took Meds & Supplements', pts: 25, tip: 'Any doctor-prescribed medication or daily essential vitamins.' },
            { id: 'q5', type: 'negative', label: 'Ate Fast Food / High Sodium', pts: -30, tip: 'Meals with over 800mg of sodium, highly processed meats, or heavy fast food.' },
            { id: 'q6', type: 'negative', label: 'Smoked or Heavy Alcohol', pts: -40, tip: 'Smoking any tobacco/vape, or consuming more than 2 alcoholic beverages.' }
        ];

        const BADGES = [
            { days: 7, name: 'Bronze Shield', icon: 'shield', color: 'text-amber-600', bg: 'bg-amber-100' },
            { days: 14, name: 'Silver Sword', icon: 'activity', color: 'text-slate-500', bg: 'bg-slate-200' },
            { days: 30, name: 'Gold Crown', icon: 'award', color: 'text-yellow-500', bg: 'bg-yellow-100' }
        ];

        // 3. Define our App State
        let state = {
            dailyInputs: {},
            score: 0,
            streak: 0,
            dayCount: 1,
            activeTooltip: null
        };

        // 4. Logic Functions
        function toggleInput(id) {
            state.dailyInputs[id] = !state.dailyInputs[id];
            renderApp();
        }

        function toggleTooltip(id) {
            state.activeTooltip = state.activeTooltip === id ? null : id;
            renderApp();
        }

        function closeTooltip() {
            state.activeTooltip = null;
            renderApp();
        }

        function submitDay() {
            if (state.score >= 60) {
                state.streak += 1;
            } else {
                state.streak = 0;
            }
            
            // Reset for next day
            state.dailyInputs = {};
            state.dayCount += 1;
            state.activeTooltip = null;
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
            renderApp();
        }

        // 5. Render Function (Updates the screen)
        function renderApp() {
            // Calculate score before rendering
            let currentScore = 0;
            QUESTIONS.forEach(q => {
                if (state.dailyInputs[q.id]) {
                    currentScore += q.pts;
                }
            });
            state.score = Math.max(0, Math.min(100, currentScore));

            const appContainer = document.getElementById('app');
            const scoreColor = state.score >= 60 ? 'text-emerald-500' : 'text-slate-400';
            const strokeColor = state.score >= 60 ? '#10b981' : '#cbd5e1';

            appContainer.innerHTML = `
                <!-- Tooltip Background Overlay (closes tooltip when clicking outside) -->
                <div class="${state.activeTooltip ? 'fixed inset-0 z-40' : 'hidden'}" onclick="closeTooltip()"></div>

                <!-- Header & Dashboard -->
                <div class="bg-white px-6 pt-10 pb-8 rounded-b-[2.5rem] shadow-sm mb-6">
                    <div class="flex justify-between items-center mb-8">
                        <div>
                            <h1 class="text-2xl font-bold text-slate-900">Health Monitor</h1>
                            <p class="text-slate-500 text-sm flex items-center gap-1 mt-1">
                                ${ICONS.calendar('w-4 h-4')} Day ${state.dayCount}
                            </p>
                        </div>
                        <div class="flex flex-col items-end">
                            <div class="flex items-center gap-1 text-orange-500 bg-orange-50 px-3 py-1 rounded-full">
                                ${ICONS.flame('w-5 h-5 fill-current')}
                                <span class="font-bold">${state.streak} Days</span>
                            </div>
                        </div>
                    </div>

                    <!-- Score Ring -->
                    <div class="flex flex-col items-center justify-center py-4">
                        <div class="relative w-40 h-40 flex items-center justify-center">
                            <svg class="w-full h-full transform -rotate-90" viewBox="0 0 100 100">
                                <circle cx="50" cy="50" r="45" fill="none" stroke="#f1f5f9" stroke-width="8"></circle>
                                <circle cx="50" cy="50" r="45" fill="none" stroke="${strokeColor}" stroke-width="8" 
                                    stroke-dasharray="${(state.score / 100) * 283} 283" 
                                    class="score-circle"></circle>
                            </svg>
                            <div class="absolute flex flex-col items-center">
                                <span class="text-4xl font-black transition-colors ${scoreColor}">${state.score}</span>
                                <span class="text-xs font-medium text-slate-400 uppercase tracking-wider mt-1">Score</span>
                            </div>
                        </div>
                        <p class="mt-4 text-sm text-slate-500 font-medium">
                            ${state.score >= 60 ? "Great job! You are on track today." : "Reach 60 points to keep your streak alive."}
                        </p>
                    </div>
                </div>

                <!-- Badges Section -->
                <div class="px-6 mb-8">
                    <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4">Milestones</h2>
                    <div class="flex gap-4 overflow-x-auto pb-2 -mx-6 px-6 snap-x">
                        ${BADGES.map((badge) => {
                            const unlocked = state.streak >= badge.days;
                            return `
                                <div class="snap-center shrink-0 w-28 h-32 rounded-2xl flex flex-col items-center justify-center p-3 border-2 transition-all ${unlocked ? 'border-transparent ' + badge.bg : 'border-dashed border-slate-200 bg-white/50 opacity-60'}">
                                    <div class="mb-2 ${unlocked ? badge.color : 'text-slate-300'}">
                                        ${ICONS[badge.icon]('w-8 h-8')}
                                    </div>
                                    <span class="text-xs font-bold text-center ${unlocked ? 'text-slate-800' : 'text-slate-400'}">
                                        ${badge.name}
                                    </span>
                                    <span class="text-[10px] mt-1 ${unlocked ? 'text-slate-600' : 'text-slate-400'}">
                                        ${badge.days} Days
                                    </span>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>

                <!-- Daily Checklist -->
                <div class="px-6 space-y-4">
                    <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-2">Daily Log</h2>
                    ${QUESTIONS.map((q) => {
                        const isActive = !!state.dailyInputs[q.id];
                        const isPositive = q.type === 'positive';
                        return `
                            <div class="relative bg-white rounded-2xl p-4 shadow-sm border border-slate-100 flex items-center justify-between">
                                <div class="flex items-center gap-3 pr-4">
                                    <button onclick="toggleTooltip('${q.id}')" class="p-1 rounded-full bg-slate-100 text-slate-400 hover:text-blue-500 hover:bg-blue-50 transition-colors">
                                        ${ICONS.info('w-5 h-5')}
                                    </button>
                                    <span class="font-medium text-sm ${isActive && !isPositive ? 'text-red-500' : 'text-slate-700'}">
                                        ${q.label}
                                    </span>
                                </div>

                                <!-- Custom Toggle Switch -->
                                <button onclick="toggleInput('${q.id}')" class="relative w-14 h-8 rounded-full transition-colors duration-300 flex items-center px-1 shrink-0 ${isActive ? (isPositive ? 'bg-emerald-500' : 'bg-red-500') : 'bg-slate-200'}">
                                    <div class="w-6 h-6 bg-white rounded-full shadow-sm transform transition-transform duration-300 flex items-center justify-center ${isActive ? 'translate-x-6' : 'translate-x-0'}">
                                        ${isActive && isPositive ? `<div class="text-emerald-500">${ICONS.check('w-4 h-4')}</div>` : ''}
                                        ${isActive && !isPositive ? `<div class="text-red-500">${ICONS.x('w-4 h-4')}</div>` : ''}
                                    </div>
                                </button>

                                <!-- Floating Tooltip -->
                                ${state.activeTooltip === q.id ? `
                                    <div class="absolute z-50 top-full left-0 mt-2 w-64 bg-slate-800 text-white text-xs p-3 rounded-xl shadow-xl">
                                        <div class="tooltip-triangle"></div>
                                        <p class="relative z-10">${q.tip}</p>
                                    </div>
                                ` : ''}
                            </div>
                        `;
                    }).join('')}
                </div>

                <!-- Bottom Action Bar -->
                <div class="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-slate-50 via-slate-50 to-transparent z-10">
                    <button onclick="submitDay()" class="w-full bg-slate-900 text-white font-bold text-lg py-4 rounded-2xl shadow-lg hover:bg-slate-800 transition-transform active:scale-95">
                        Simulate Next Day
                    </button>
                </div>
            `;
        }

        // 6. Initialize the App
        renderApp();
    </script>
</body>
</html>
